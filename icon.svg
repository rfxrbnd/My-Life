<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Icon Background with rounded corners (iOS/Android Style) -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)"/>

  <!-- Glowing Outer Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#3b82f6" stroke-width="4" opacity="0.3" stroke-dasharray="15 15" />

  <!-- Shield Shape (RPG Element) -->
  <path d="M256 96 L400 160 V280 C400 390 256 460 256 460 C256 460 112 390 112 280 V160 Z" 
        fill="none" stroke="url(#shieldGradient)" stroke-width="24" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Inner Dark Shield -->
  <path d="M256 112 L380 170 V275 C380 370 256 430 256 430 C256 430 132 370 132 275 V170 Z" 
        fill="#0f172a" opacity="0.8"/>

  <!-- Golden XP Star -->
  <path d="M256 160 L284 235 L365 240 L295 292 L315 370 L256 325 L197 370 L217 292 L147 240 L228 235 Z" 
        fill="#eab308" filter="url(#glow)"/>
</svg>